{% extends 'blog/base.html' %}

{% block title %}Delete {{ blog.title }} - MyBlog{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body text-center">
                <i class="bi bi-exclamation-triangle text-danger" style="font-size: 2.5rem;"></i>
                <h4 class="mt-3">Delete "{{ blog.title }}"?</h4>
                <p class="text-muted">This action cannot be undone.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> Yes, Delete</button>
                    <a href="{% url 'blog_detail' blog.slug %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
